name: Deploy via rsync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install rsync -y

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust server host
        run: ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='uploads/' \
            --exclude='thumbnails/' \
            --exclude='ac_shop.db' \
            --exclude='php.ini' \
            -e "ssh -i ~/.ssh/id_ed25519" ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/ac-incheon/"

      - name: Upload images (uploads/)
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" "mkdir -p /var/www/ac-incheon/uploads /var/www/ac-incheon/thumbnails"
          rsync -az --ignore-existing \
            -e "ssh -i ~/.ssh/id_ed25519" uploads/ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/ac-incheon/uploads/"

      - name: Reload PHP-FPM
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" "sudo systemctl reload php8.1-fpm"
