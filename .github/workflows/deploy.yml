name: Deploy via rsync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install rsync -y

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust server host
        run: ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Create deploy marker
        run: |
          printf "sha=%s\nref=%s\nrun_id=%s\nutc=%s\n" "${GITHUB_SHA}" "${GITHUB_REF}" "${GITHUB_RUN_ID}" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > deploy_marker.txt

      - name: Deploy via rsync
        run: |
          TARGET_DIR="${{ secrets.SERVER_PATH }}"
          if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR="/var/www/ac-incheon"
          fi

          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='thumbnails/' \
            --exclude='php.ini' \
            -e "ssh -i ~/.ssh/id_ed25519" ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${TARGET_DIR}/"

      - name: Verify deployed files (hashes)
        continue-on-error: true
        run: |
          TARGET_DIR="${{ secrets.SERVER_PATH }}"
          if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR="/var/www/ac-incheon"
          fi

          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" "echo '--- nginx root (if readable) ---'; (grep -R \"root \" -n /etc/nginx/sites-enabled 2>/dev/null | head -n 50 || true); echo '--- target dir ---'; echo \"${TARGET_DIR}\"; cd \"${TARGET_DIR}\" 2>/dev/null && (cat deploy_marker.txt 2>/dev/null || true) && (sha256sum index.php style.css 2>/dev/null || true) && (ls -la uploads 2>/dev/null | head -n 20 || true) && (ls -la ac_shop.db 2>/dev/null || true)"

      - name: Reload PHP-FPM
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" "sudo systemctl reload php8.1-fpm"
